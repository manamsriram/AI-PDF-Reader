<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocSense AI</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="docsenseApp" x-init="init()">

  <div id="supabase-config"
       data-url="{{ supabase_url }}"
       data-key="{{ supabase_anon_key }}"
       hidden></div>

  <!-- Auth modal -->
  <div class="auth-overlay" x-show="!authToken" x-cloak>
    <div class="auth-modal">
      <div class="auth-modal-title">DocSense AI</div>

      <!-- Verify email screen -->
      <template x-if="authVerifyPending">
        <div class="auth-verify">
          <div class="auth-verify-icon">✉️</div>
          <div class="auth-verify-heading">Check your email</div>
          <div class="auth-verify-body">
            We sent a confirmation link to <strong x-text="authEmail"></strong>.
            Click it to activate your account, then sign in here.
          </div>
          <button class="auth-submit" @click="authVerifyPending = false; authMode = 'login'; authPassword = ''; authConfirmPassword = ''">
            Back to Sign In
          </button>
        </div>
      </template>

      <!-- Login / Signup form -->
      <template x-if="!authVerifyPending">
        <div class="auth-form">
          <div class="auth-tabs">
            <button class="auth-tab" :class="{ active: authMode === 'login' }" @click="authMode = 'login'; authError = ''">Sign In</button>
            <button class="auth-tab" :class="{ active: authMode === 'signup' }" @click="authMode = 'signup'; authError = ''">Sign Up</button>
          </div>
          <div class="auth-error" x-show="authError" x-text="authError"></div>
          <input class="auth-input" type="text" x-model="authName" placeholder="Full Name"
                 x-show="authMode === 'signup'"
                 @keydown.enter="signup()">
          <input class="auth-input" type="email" x-model="authEmail" placeholder="Email"
                 @keydown.enter="authMode === 'login' ? login() : signup()">
          <input class="auth-input" type="password" x-model="authPassword" placeholder="Password"
                 @keydown.enter="authMode === 'login' ? login() : signup()">
          <input class="auth-input" type="password" x-model="authConfirmPassword" placeholder="Confirm Password"
                 x-show="authMode === 'signup'"
                 @keydown.enter="signup()">
          <button class="auth-submit" @click="authMode === 'login' ? login() : signup()" :disabled="authLoading">
            <span x-text="authLoading ? 'Please wait…' : (authMode === 'login' ? 'Sign In' : 'Create Account')"></span>
          </button>
        </div>
      </template>

    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" x-show="authToken" x-cloak>
    <button class="history-toggle" @click="sidebarOpen = !sidebarOpen" title="Toggle history">☰</button>
    <span class="navbar-brand">DocSense AI</span>
    <div class="navbar-spacer"></div>
    <div class="model-badge">
      <div class="model-dot"></div>
      <span>Llama 3.3 70B</span>
    </div>
    <button class="docs-toggle" @click="toggleDocs()">
      ☰ <span x-text="docCount"></span> Docs
      <span x-text="docsExpanded ? '▾' : '▸'"></span>
    </button>
    <button class="btn-logout" @click="logout()">Sign Out</button>
  </nav>

  <!-- Collapsible docs bar -->
  <div class="docs-bar" x-show="authToken" x-cloak>
    <div class="docs-bar-summary" @click="toggleDocs()">
      <span class="docs-bar-arrow" x-text="docsExpanded ? '▾' : '▸'"></span>
      <span class="docs-bar-label"
        x-text="docCount + ' document' + (docCount === 1 ? '' : 's') + ' indexed'">
      </span>
      <button class="btn-upload" @click.stop="triggerUpload()" :disabled="loading">
        + Upload PDF
      </button>
    </div>

    <div class="docs-list" x-show="docsExpanded" x-transition>
      <template x-if="documents.length === 0">
        <div class="docs-empty">No documents indexed yet. Upload a PDF to get started.</div>
      </template>
      <template x-for="doc in documents" :key="doc.filename">
        <div class="doc-row">
          <span>📄</span>
          <span class="doc-row-name" x-text="doc.filename"></span>
          <span class="doc-row-meta" x-text="doc.chunks + ' chunks'"></span>
        </div>
      </template>
    </div>

    <div x-show="uploadStatus"
         class="upload-status"
         :class="uploadStatusType"
         x-text="uploadStatus">
    </div>

    <input type="file" accept=".pdf" hidden x-ref="fileInput" @change="handleUpload($event)">
  </div>

  <!-- Main content -->
  <div class="content" x-show="authToken" x-cloak>

    <!-- History sidebar -->
    <div class="history-sidebar" :class="{ open: sidebarOpen }">
      <div class="history-header">
        <span>History</span>
        <button class="new-chat-btn" @click="newChat()" title="Start new chat">+ New Chat</button>
      </div>
      <div class="history-body">
        <template x-if="history.length === 0">
          <div class="history-empty">No conversations yet.</div>
        </template>
        <template x-for="session in history" :key="session.session_id">
          <div class="history-item" @click="loadHistoryItem(session)">
            <div class="history-item-question" x-text="session.questions[0]?.question || 'Untitled conversation'"></div>
            <div class="history-item-meta">
              <span class="history-item-date" x-text="formatDate(session.started_at)"></span>
              <span class="history-item-count" x-show="session.questions.length > 1" x-text="session.questions.length + ' questions'"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel">
      <div class="messages" x-ref="messagesList">

        <template x-if="messages.length === 0 && !loading">
          <div class="messages-empty">
            Upload a PDF above, then ask anything about it.
          </div>
        </template>

        <template x-for="(msg, i) in messages" :key="i">
          <div :class="msg.role === 'user' ? 'message message-user' : 'message message-bot'">
            <template x-if="msg.role === 'user'">
              <span x-text="msg.text"></span>
            </template>
            <template x-if="msg.role === 'bot'">
              <div x-html="msg.html"></div>
            </template>
          </div>
        </template>

        <div class="typing-indicator" x-show="loading">
          Thinking
          <span class="typing-dots">
            <span></span><span></span><span></span>
          </span>
        </div>

      </div>

      <div class="input-area">
        <textarea
          class="input-textarea"
          x-model="question"
          x-ref="textarea"
          @keydown="handleKeydown($event)"
          @input="autoResize($event)"
          :disabled="loading"
          placeholder="Ask anything about your documents…"
          rows="1"
        ></textarea>
        <button
          class="btn-ask"
          @click="ask()"
          :disabled="loading || !question.trim()"
        >Ask →</button>
      </div>
    </div>

    <!-- Sources panel -->
    <div class="sources-panel">
      <div class="sources-header">Sources</div>
      <div class="sources-body">

        <template x-if="sources.length === 0">
          <div class="sources-empty">
            Sources will appear here after your first answer.
          </div>
        </template>

        <template x-for="(src, i) in sources" :key="i">
          <div class="source-card">
            <div class="source-card-header">
              <span class="source-card-filename" x-text="src.source"></span>
              <span class="source-card-page" x-text="'Page ' + src.page"></span>
              <span class="source-card-score" x-text="scorePercent(src.score)"></span>
            </div>
            <div class="source-card-excerpt" x-text="src.text"></div>
          </div>
        </template>

      </div>
    </div>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
